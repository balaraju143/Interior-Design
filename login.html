<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login | Stackly Interior Atelier</title>

    <!-- Google Font -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->

    <link rel="stylesheet"
          href="css/login.css">
   <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div id="loader">

    <div class="loader-card">

        <div class="loader-circle">

            <div class="circle-ring"></div>

            <div class="circle-ring ring-two"></div>

            <img src="images/red-logo.webp"
                 class="loader-logo"
                 alt="Stackly">

        </div>

        <h1>STACKLY</h1>

        <p>

            Crafting premium interiors with timeless elegance

        </p>

        <div class="loader-progress">

            <div class="loader-progress-fill"></div>

        </div>

        <span id="loading-count">0%</span>

    </div>

</div>





<!--=========================================
            BACKGROUND SHAPES
==========================================-->

<div class="login-bg">

    <span></span>
    <span></span>
    <span></span>
    <span></span>

</div>

<!--=========================================
            LOGIN SECTION
==========================================-->

<section class="login-section">

<div class="container">

<div class="login-wrapper">

<!--===========================
        LEFT SIDE
============================-->

<div class="login-left">

<div class="login-image">

<img src="images/design.webp"
     alt="Luxury Interior">

</div>

<div class="login-overlay">

<h2>

Luxury Interior
Experience

</h2>

<p>

Crafting timeless spaces with
creativity, elegance and
premium craftsmanship.

</p>

</div>

</div>

<!--===========================
        RIGHT SIDE
============================-->

<div class="login-right">

<div class="login-box">

<img src="images/red-logo.webp"
     class="login-logo"
     alt="Logo">

<h2>

Welcome Back

</h2>

<p>

Login to continue your
dashboard.

</p>

<!--===========================
      ACCOUNT TYPE
============================-->

<div class="account-type">

<div class="type-card active"
     data-role="admin">

<i class="fa-solid fa-user-shield"></i>

<span>

Admin

</span>

</div>

<div class="type-card"
     data-role="client">

<i class="fa-solid fa-user"></i>

<span>

Client

</span>

</div>

</div>

<!--===========================
        LOGIN FORM
============================-->

<form id="loginForm"
      novalidate>

<input type="hidden"
       id="userRole"
       value="admin">

<!-- Email -->

<div class="input-group">

<i class="fa-solid fa-envelope"></i>

<input
type="email"
id="email"
placeholder="Email Address">

<small id="emailError"
       class="error-message"></small>

</div>

<!-- Password -->

<div class="input-group password-group">

<i class="fa-solid fa-lock"></i>

<input
type="password"
id="password"
placeholder="Password">

<button
type="button"
id="togglePassword"
class="toggle-password">

<i class="fa-solid fa-eye"></i>

</button>

<small id="passwordError"
       class="error-message"></small>

</div>

<!-- Remember -->

<div class="remember-box">

<label>

<input
type="checkbox">

Remember Me

</label>

<a href="404.html">

Forgot Password?

</a>

</div>

<!-- Login Button -->

<button
type="submit"
class="login-btn">

<span>

Login

</span>

<i class="fa-solid fa-arrow-right"></i>

</button>

<p id="successMessage"
   class="success-message"></p>

<!-- Bottom Link -->

<div class="login-footer">

<p>

Don't have an account?

<a href="signup.html">

Create Account

</a>

</p>

</div>
</form>

</div>

</div>

</div>

</section>

<!--===========================
        JAVASCRIPT
============================-->

<script src="js/login.js"></script>

</body>

</html>
