<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Create Account | Stackly Interior Atelier</title>

    <!-- Google Font -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->

    <link rel="stylesheet"
          href="css/signup.css">

</head>

<body>

<!--=========================================
        BACKGROUND
==========================================-->

<div class="signup-bg">

    <span></span>
    <span></span>
    <span></span>
    <span></span>

</div>

<!--=========================================
        SIGNUP SECTION
==========================================-->

<section class="signup-section">

<div class="container">

<div class="signup-wrapper">

<!--==============================
        LEFT IMAGE
===============================-->

<div class="signup-left">

<div class="signup-image">

<img src="images/office-interior.webp"
     alt="Luxury Interior">

</div>

<div class="signup-overlay">

<h2>

Join Our
Luxury Community

</h2>

<p>

Create your account and experience
beautiful interiors, premium services
and modern design inspiration.

</p>

</div>

</div>

<!--==============================
        RIGHT
===============================-->

<div class="signup-right">

<div class="signup-box">

<img src="images/red-logo.webp"
     class="signup-logo"
     alt="Logo">

<h2>

Create Account

</h2>

<p>

Complete the form below to
create your account.

</p>

<!--==============================
        ACCOUNT TYPE
===============================-->

<div class="account-type">

<div class="type-card active"
     data-role="admin">

<i class="fa-solid fa-user-shield"></i>

<span>

Admin

</span>

</div>

<div class="type-card"
     data-role="client">

<i class="fa-solid fa-user"></i>

<span>

Client

</span>

</div>

</div>

<!--==============================
        SIGNUP FORM
===============================-->

<form id="signupForm"
      novalidate>

<input
type="hidden"
id="userRole"
value="admin">

<!--==============================
        FULL NAME
===============================-->

<div class="input-group">

<i class="fa-solid fa-user"></i>

<input

type="text"

id="fullName"

placeholder="Full Name">

<small

id="nameError"

class="error-message">

</small>

</div>

<!--==============================
        EMAIL
===============================-->

<div class="input-group">

<i class="fa-solid fa-envelope"></i>

<input

type="email"

id="email"

placeholder="Email Address">

<small

id="emailError"

class="error-message">

</small>

</div>

<!--==============================
        PASSWORD
===============================-->

<div class="input-group password-group">

<i class="fa-solid fa-lock"></i>

<input

type="password"

id="password"

placeholder="Password">

<button

type="button"

class="toggle-password"

id="togglePassword">

<i class="fa-solid fa-eye"></i>

</button>

<small

id="passwordError"

class="error-message">

</small>

</div>

<!--==============================
    CONFIRM PASSWORD
===============================-->

<div class="input-group password-group">

<i class="fa-solid fa-lock"></i>

<input

type="password"

id="confirmPassword"

placeholder="Confirm Password">

<button

type="button"

class="toggle-password"

id="toggleConfirm">

<i class="fa-solid fa-eye"></i>

</button>

<small

id="confirmError"

class="error-message">

</small>

</div>

<!--==============================
    PASSWORD STRENGTH
===============================-->

<div class="strength-box">

<div class="strength-bar">

<span id="strengthFill"></span>

</div>

<p id="strengthText">

Password Strength

</p>

</div>

<!--==============================
    CREATE BUTTON
===============================-->

<button

type="submit"

class="signup-btn">

<span>

Create Account

</span>

<i class="fa-solid fa-arrow-right"></i>

</button>

<p

id="successMessage"

class="success-message">

</p>

<!--==============================
        LOGIN LINK
===============================-->

<div class="signup-footer">

<p>

Already have an account?

<a href="login.html">

Login

</a>

</p>

</div>
</form>

</div>

</div>

</div>

</section>

<!--==============================
        JAVASCRIPT
===============================-->

<script src="js/signup.js"></script>

</body>

</html>
